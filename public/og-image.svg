  <text x="110" y="188" fill="#111111" font-family="Inter, Arial, sans-serif" font-size="30" font-weight="700" letter-spacing="10">THEAPDESIGN.ART</text>
  <text x="110" y="300" fill="#111111" font-family="Inter, Arial, sans-serif" font-size="74" font-weight="900">Uygulama ürünleri</text>
  <text x="110" y="390" fill="#7c9bff" font-family="Inter, Arial, sans-serif" font-size="90" font-weight="900">soft ve temiz</text>
  <text x="112" y="465" fill="rgba(17,17,17,0.68)" font-family="Inter, Arial, sans-serif" font-size="28">Beyaz temalı, ürün odaklı ve yumuşak renkli dijital deneyimler.</text>
